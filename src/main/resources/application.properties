spring.application.name=starter

# Local PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/leather_proizvodnja
spring.datasource.username=leather_proizvodnja
spring.datasource.password=kistibojice
spring.datasource.driver-class-name=org.postgresql.Driver

